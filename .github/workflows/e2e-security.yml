name: E2E Security Headers

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  headers-smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      NO_PROXY: localhost,127.0.0.1
      no_proxy: localhost,127.0.0.1
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22.22.2
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run security headers E2E smoke
        run: npm run test:e2e -- tests/e2e/headers.spec.ts --project="Desktop Chrome"
